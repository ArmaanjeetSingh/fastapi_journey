{% extends 'base.html' %}

{% block content %}


<div class="container">
    <div class="card text-center">
        <div class="card-header">
            Your Todos
        </div>
    </div>
    <div class="card-body">
        <h5 class=" card-title">List of your todos</h5>
        <table class="table table-hovered">
            <thead>
                <tr>
                    <th scope = col>#</th>
                    <th scope = col>Info</th>
                    <th scope = col>Action</th>
                </tr>
            </thead>
            <tbody>
                {% for todo in todos %}
                {% if todo.complete == False %}
                <tr class="pointer">
                    <td>{{loop.index}}</td>
                    <td>{{todo.title}}</td>
                    <td>
                        <button onclick = "window.location.href = 'edit-todo-page/{{todo.id}}'" type = 'button' class = 'btn btn-info'>
                            Edit
                        </button>
                    </td>
                </tr>
                {% else %}
                <tr class="pointer">
                    <td>{{loop.index}}</td>
                    <td>{{todo.title}}</td>
                    <td>
                        <button onclick = "window.location.href = 'edit-todo-page/{{todo.id}}'" type = 'button' class = 'btn btn-info'>
                            Edit
                        </button>
                    </td>
                </tr>
                {% endif %}
                {% endfor %}
            </tbody>
        </table>
        <a href="/todos/add-todo-page" class = 'btn btn-primary'>Add Todo</a>
    </div>
</div>
{% endblock content %}
