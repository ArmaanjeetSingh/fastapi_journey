{% extends 'base.html' %}
{% block content %}

<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">Register</h4>
        </div>
        <div class="card-body">
            <form action="/auth/register" method="POST" id="registerForm">
                <div class="row">
                    <div class="form-group col-md-6 mb-3">
                        <label for="email">Email</label>
                        <input type="email" class="form-control" name="email" id="email" required>
                    </div>
                    <div class="form-group col-md-6 mb-3">
                        <label for="username">Username</label>
                        <input type="text" class="form-control" name="username" id="username" required>
                    </div>
                    <div class="form-group col-md-6 mb-3">
                        <label for="first_name">First Name</label>
                        <input type="text" class="form-control" name="first_name" id="first_name" required>
                    </div>
                    <div class="form-group col-md-6 mb-3">
                        <label for="last_name">Last Name</label>
                        <input type="text" class="form-control" name="last_name" id="last_name" required>
                    </div>
                    <div class="form-group col-md-6 mb-3">
                        <label for="role">Role</label>
                        <input type="text" class="form-control" name="role" id="role" placeholder="e.g. Admin, User" required>
                    </div>
                    <div class="form-group col-md-6 mb-3">
                        <label for="phone_number">Phone Number</label>
                        <input type="tel" class="form-control" name="phone_number" id="phone_number" required>
                    </div>
                    <div class="form-group col-md-6 mb-3">
                        <label for="password">Password</label>
                        <input type="password" class="form-control" name="password" id="password" required>
                    </div>
                    <div class="form-group col-md-6 mb-3">
                        <label for="confirm_password">Verify Password</label>
                        <input type="password" class="form-control" name="confirm_password" id="confirm_password" required>
                    </div>
                </div>
                
                <div class="mt-3">
                    <button type="submit" class="btn btn-success w-100">Create Account</button>
                </div>
            </form>
        </div>
        <div class="card-footer text-center">
            <a href="/auth/login-page" class="text-decoration-none">Already have an account? Login</a>
        </div>
    </div>
</div>

{% endblock content %}
