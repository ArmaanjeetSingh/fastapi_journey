{% extends 'base.html' %}
{% block content %}

    <div class="container">
        <div class="card">
            <div class="card-header">
                Login
            </div>
        </div>
        <div class="card-body">
            <form action="" id="loginForm">
                <div class="form-group">
                    <label for="">Username</label>
                    <input type="text" class = 'form-control' name = 'username' autocomplete = 'username' required>
                </div>
                 <div class="form-group">
                    <label for="">Password</label>
                    <input type="text" class = 'form-control' name = 'password' autocomplete = 'password' required>
                </div>
                <button type = 'password' class = 'btn btn-primary'>Login</button>
            </form>
        </div>
        <div class="card-footer text-center">
            <a href="/auth/register-page">Register?</a>
        </div>
    </div>

    
{% endblock content %}
